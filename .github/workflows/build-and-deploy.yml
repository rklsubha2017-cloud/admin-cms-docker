name: Build and Update Manifests

on:
  push:
    branches:
      - main # Triggers on every push to the main branch
    paths-ignore:
      - 'k8s-manifests/**' # Don't trigger a build if we only changed a k8s yaml file

env:
  REGISTRY: ghcr.io
  # github.repository will automatically be your GitHub "username/reponame"
  IMAGE_NAME: ${{ github.repository }} 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 1. Build and Push koha-admin
      - name: Build and push koha-admin
        uses: docker/build-push-action@v5
        with:
          context: ./koha-admin-app
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/koha-admin:${{ github.sha }}

      # 2. Build and Push koha-cms Backend
      - name: Build and push koha-cms-backend
        uses: docker/build-push-action@v5
        with:
          context: ./koha-cms-app/backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/koha-cms-backend:${{ github.sha }}

      # 3. Build and Push koha-cms Frontend
      - name: Build and push koha-cms-frontend
        uses: docker/build-push-action@v5
        with:
          context: ./koha-cms-app/frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/koha-cms-frontend:${{ github.sha }}

      # 4. GitOps: Update the Kubernetes manifests with the new image tags
      - name: Update Kubernetes manifests
        run: |
          # Use 'sed' to replace the old image tags with the new Git commit SHA
          sed -i "s|image: .*/koha-admin:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/koha-admin:${{ github.sha }}|g" k8s-manifests/koha-admin-deployment.yaml
          
          sed -i "s|image: .*/koha-cms-backend:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/koha-cms-backend:${{ github.sha }}|g" k8s-manifests/koha-cms-backend-deployment.yaml
          
          sed -i "s|image: .*/koha-cms-frontend:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/koha-cms-frontend:${{ github.sha }}|g" k8s-manifests/koha-cms-frontend-deployment.yaml

      # 5. Commit the updated manifests back to the repository
      - name: Commit manifest changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add k8s-manifests/
          # We add [skip ci] to the commit message so this push doesn't trigger the workflow again in an infinite loop
          git commit -m "chore: update image tags to ${{ github.sha }} [skip ci]" || echo "No changes to commit"
          git push