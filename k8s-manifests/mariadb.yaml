# 1. Reserve permanent hard drive space for the database
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mariadb-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
# 2. Deploy the actual MariaDB container
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mariadb
spec:
  serviceName: "mariadb"
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      containers:
      - name: mariadb
        image: mariadb:10.11
        ports:
        - containerPort: 3306
        env:
        # We are securely pulling the environment variables you defined 
        # in the koha-cms-secrets file so the DB configures itself correctly.
        - name: MARIADB_DATABASE
          valueFrom:
            secretKeyRef:
              name: koha-cms-secrets
              key: DB_NAME
        - name: MARIADB_USER
          valueFrom:
            secretKeyRef:
              name: koha-cms-secrets
              key: DB_USER
        - name: MARIADB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: koha-cms-secrets
              key: DB_PASS
        # The root password for administrative database access
        - name: MARIADB_ROOT_PASSWORD
          value: "a_secure_root_password_here" 
        volumeMounts:
        - name: mariadb-storage
          mountPath: /var/lib/mysql
      volumes:
      - name: mariadb-storage
        persistentVolumeClaim:
          claimName: mariadb-pvc

---
# 3. Create the internal network name so koha-cms can talk to it
apiVersion: v1
kind: Service
metadata:
  name: mariadb
spec:
  ports:
  - port: 3306
  selector:
    app: mariadb